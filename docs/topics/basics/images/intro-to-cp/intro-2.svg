  <text x="1725" y="278" text-anchor="middle" fill="#2C4A7C" font-size="26" font-weight="bold">World</text>
  <text x="1725" y="311" text-anchor="middle" fill="#2C4A7C" font-size="26" font-weight="bold">Finals</text>

