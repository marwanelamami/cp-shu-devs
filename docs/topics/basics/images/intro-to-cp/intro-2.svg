<svg viewBox="0 0 2020 570" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="glowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- YOU ARE HERE bubble -->
  <g>
    <rect x="230" y="80" width="175" height="42" rx="21" fill="#ffffff" stroke="#2C4A7C" stroke-width="2"/>
    <path d="M 300 122 L 318 122 L 309 138 Z" fill="#ffffff" stroke="#2C4A7C" stroke-width="2"/>
    <text x="317" y="107" text-anchor="middle" fill="#2C4A7C" font-size="15" font-weight="bold" letter-spacing="0.5">YOU ARE HERE</text>
  </g>

  <!-- LCPC filled circle -->
  <g filter="url(#glowRed)">
    <circle cx="317" cy="268" r="105" fill="#2C4A7C"/>
  </g>
  <circle cx="317" cy="268" r="105" fill="#2C4A7C"/>
  <text x="317" y="280" text-anchor="middle" fill="#ffffff" font-size="34" font-weight="bold">LCPC</text>

  <!-- ACPC outline circle -->
  <circle cx="1022" cy="268" r="105" fill="#ffffff" stroke="#2C4A7C" stroke-width="4"/>
  <text x="1022" y="280" text-anchor="middle" fill="#2C4A7C" font-size="30" font-weight="bold">ACPC</text>

  <!-- ICPC World Finals outline circle -->
