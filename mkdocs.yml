site_name: CP-SHU-Devs
site_description: SHU Developers Club — Competitive Programming Hub
site_url: https://marwanelamami.github.io/cp-shu-devs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

repo_url: https://github.com/marwanelamami/cp-shu-devs
repo_name: marwanelamami/cp-shu-devs

nav:
  - Home: index.md
  - Topics:
    - Basics:
      - Intro to CP & Complexity: topics/basics/intro-to-cp.md
      - Arrays:
        - Static Arrays: topics/basics/static-arrays.md
        - Dynamic Arrays: topics/basics/dynamic-arrays.md
      - Kadane's Algorithm: topics/basics/kadanes-algorithm.md
      - Prefix Sums: topics/basics/prefix-sums/prefix-sums.md
      - Two Pointers: topics/basics/two-pointers/two-pointers.md
      - Sliding Window:
        - Fixed Size: topics/basics/sliding-window/fixed-size.md
        - Variable Size: topics/basics/sliding-window/variable-size.md
      - Two Pointers: topics/basics/two-pointers.md
      - Prefix Sums: topics/basics/prefix-sums.md
  - Resources: resources.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - attr_list
