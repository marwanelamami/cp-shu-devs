site_name: CP Playbook
site_description: A competitive programming training resource created for LCPC preparation and broader CP growth, maintained by the SHU Developers Club community.
site_url: https://marwanelamami.github.io/cp-shu-devs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

repo_url: https://github.com/marwanelamami/cp-shu-devs
repo_name: marwanelamami/cp-shu-devs

nav:
  - Home: index.md
  - Basics:
    - Intro to CP & Complexity: topics/basics/01-intro-to-cp/intro-to-cp.md
    - Arrays:
      - Static Arrays: topics/basics/02-arrays/static-arrays.md
      - Dynamic Arrays: topics/basics/02-arrays/dynamic-arrays.md
    - Kadane's Algorithm: topics/basics/03-kadanes-algorithm/kadanes-algorithm.md
    - Sliding Window:
      - Fixed Size: topics/basics/04-sliding-window/fixed-size.md
      - Variable Size: topics/basics/04-sliding-window/variable-size.md
    - Two Pointers: topics/basics/05-two-pointers/two-pointers.md
    - Prefix Sums: topics/basics/06-prefix-sums/prefix-sums.md
  - Useful Links: resources.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - attr_list
