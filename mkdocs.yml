site_name: CP-SHU-Devs
site_description: SHU Developers Club — Competitive Programming Hub
site_url: https://marwanelamami.github.io/cp-shu-devs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/marwanelamami/cp-shu-devs
repo_name: marwanelamami/cp-shu-devs

nav:
  - Home: index.md
  - Topics:
    - Basics:
      - Intro to CP & Complexity: topics/basics/intro-to-cp.md
      - Arrays: topics/basics/arrays.md
      - Kadane's Algorithm: topics/basics/kadanes-algorithm.md
  - Resources: resources.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
