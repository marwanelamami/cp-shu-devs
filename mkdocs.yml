site_name: CP Playbook
site_description: A competitive programming training resource created for LCPC preparation and broader CP growth, maintained by the SHU Developers Club community.
site_url: https://marwanelamami.github.io/cp-shu-devs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

repo_url: https://github.com/marwanelamami/cp-shu-devs
repo_name: marwanelamami/cp-shu-devs

